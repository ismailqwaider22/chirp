name: Bug report
description: Transfer failure, MD5 mismatch, or performance regression
labels: ["bug"]
body:
  - type: input
    id: os
    attributes:
      label: OS and Rust version
      placeholder: "Ubuntu 24.04, rustc 1.85.0"
    validations:
      required: true
  - type: input
    id: conditions
    attributes:
      label: Network conditions
      placeholder: "2% loss, 120ms RTT, LTE modem"
    validations:
      required: true
  - type: input
    id: file_size
    attributes:
      label: File size
      placeholder: "200 MB"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (RUST_LOG=debug)
      description: Full sender and receiver output
      render: shell
    validations:
      required: true
  - type: textarea
    id: md5
    attributes:
      label: MD5 checksums
      placeholder: "source: abc123  received: def456"
