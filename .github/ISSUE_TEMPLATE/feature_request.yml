name: Feature request
description: New capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case and why existing behaviour is insufficient
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      options:
        - label: Does not break no_std protocol core
        - label: Includes benchmarks or test proving improvement
        - label: Zero new clippy warnings
