<svg viewBox="0 0 900 510" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
<defs>
  <style>
    .lbl   { fill: currentColor; }
    .lbl-m { fill: currentColor; opacity: 0.55; }
    @keyframes pkt{0%{transform:translateX(0);opacity:0}5%{opacity:1}88%{opacity:1}100%{transform:translateX(390px);opacity:0}}
    @keyframes drop{0%{transform:translateX(0);opacity:0}5%{opacity:1}40%{transform:translateX(158px);opacity:1}55%{transform:translateX(158px);opacity:0}100%{transform:translateX(158px);opacity:0}}
    @keyframes nack{0%,42%{opacity:0}55%{opacity:1}85%{opacity:1}100%{opacity:0}}
    @keyframes rtx{0%,52%{transform:translateX(0);opacity:0}56%{opacity:1}96%{opacity:1}100%{transform:translateX(390px);opacity:0}}
    .p1{animation:pkt 3.2s linear infinite}
    .p2{animation:pkt 3.2s linear infinite;animation-delay:.55s}
    .p3{animation:pkt 3.2s linear infinite;animation-delay:1.1s}
    .p4{animation:pkt 3.2s linear infinite;animation-delay:1.65s}
    .fp{animation:pkt 3.2s linear infinite;animation-delay:2.05s}
    .dp{animation:drop 3.2s linear infinite;animation-delay:1.38s}
    .nk{animation:nack 3.2s ease-in-out infinite}
    .rx{animation:rtx 3.2s linear infinite}
  </style>
  <marker id="aw" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
    <path d="M0,0 L7,3.5 L0,7 Z" fill="#EF4444"/>
  </marker>
</defs>

<!-- SENDER -->
<rect x="32" y="60" width="78" height="148" rx="5" fill="#1A2B4A"/>
<rect x="41" y="72"  width="60" height="10" rx="2" fill="#243450"/>
<rect x="41" y="88"  width="60" height="10" rx="2" fill="#243450"/>
<rect x="41" y="104" width="60" height="10" rx="2" fill="#243450"/>
<rect x="91" y="75"  width="4"  height="4"  rx="1" fill="#22C55E"/>
<rect x="91" y="91"  width="4"  height="4"  rx="1" fill="#F97316"/>
<rect x="91" y="107" width="4"  height="4"  rx="1" fill="#22C55E"/>
<line x1="71" y1="60" x2="71" y2="44" stroke="#334155" stroke-width="2"/>
<circle cx="71" cy="41" r="4" fill="none" stroke="#F97316" stroke-width="1.8"/>
<rect x="28" y="208" width="86" height="6" rx="2" fill="#334155"/>
<text x="71" y="232" text-anchor="middle" font-size="11" font-weight="700" class="lbl">sender</text>

<!-- LINK LINE with dashes and loss markers -->
<line x1="120" y1="130" x2="760" y2="130" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="8,5"/>
<!-- loss X markers -->
<text x="348" y="124" font-size="11" fill="#EF4444" opacity="0.7">&#xD7;</text>
<text x="498" y="136" font-size="11" fill="#EF4444" opacity="0.7">&#xD7;</text>
<text x="580" y="122" font-size="11" fill="#EF4444" opacity="0.5">&#xD7;</text>

<!-- RECEIVER DRONE -->
<path d="M 762,128 Q 766,120 780,120 L 830,120 Q 844,120 846,128 Q 844,139 830,141 L 780,141 Q 766,141 762,128 Z" fill="#1A2B4A"/>
<line x1="780" y1="122" x2="756" y2="99"  stroke="#1A2B4A" stroke-width="5" stroke-linecap="round"/>
<line x1="830" y1="122" x2="854" y2="99"  stroke="#1A2B4A" stroke-width="5" stroke-linecap="round"/>
<circle cx="756" cy="99" r="5" fill="#334155"/>
<circle cx="854" cy="99" r="5" fill="#334155"/>
<line x1="732" y1="99" x2="780" y2="99" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
<line x1="734" y1="95" x2="778" y2="103" stroke="#94A3B8" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
<line x1="830" y1="99" x2="878" y2="99" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
<line x1="832" y1="95" x2="876" y2="103" stroke="#94A3B8" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
<line x1="782" y1="141" x2="778" y2="158" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
<line x1="826" y1="141" x2="830" y2="158" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
<line x1="768" y1="158" x2="792" y2="158" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
<line x1="816" y1="158" x2="840" y2="158" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
<line x1="805" y1="141" x2="805" y2="151" stroke="#334155" stroke-width="2"/>
<circle cx="805" cy="157" r="6" fill="#243450" stroke="#334155" stroke-width="1.5"/>
<circle cx="805" cy="157" r="2.5" fill="#1A2B4A"/>
<circle cx="793" cy="120" r="2.5" fill="#F97316"/>
<circle cx="836" cy="128" r="2.5" fill="#F97316"/>
<rect x="760" y="194" width="6" height="6" rx="2" fill="#334155"/>
<text x="805" y="193" text-anchor="middle" font-size="11" font-weight="700" class="lbl">receiver</text>

<!-- PACKETS -->
<g class="p1" transform="translate(165,113)"><rect width="20" height="14" rx="2" fill="#1A2B4A"/><text x="10" y="10" text-anchor="middle" font-size="8" font-weight="700" fill="white">D</text></g>
<g class="p2" transform="translate(165,113)"><rect width="20" height="14" rx="2" fill="#1A2B4A"/><text x="10" y="10" text-anchor="middle" font-size="8" font-weight="700" fill="white">D</text></g>
<g class="p3" transform="translate(165,113)"><rect width="20" height="14" rx="2" fill="#1A2B4A"/><text x="10" y="10" text-anchor="middle" font-size="8" font-weight="700" fill="white">D</text></g>
<g class="p4" transform="translate(165,113)"><rect width="20" height="14" rx="2" fill="#1A2B4A"/><text x="10" y="10" text-anchor="middle" font-size="8" font-weight="700" fill="white">D</text></g>
<g class="fp"  transform="translate(165,113)"><rect width="20" height="14" rx="2" fill="#F97316"/><text x="10" y="10" text-anchor="middle" font-size="8" font-weight="700" fill="white">F</text></g>
<g class="dp"  transform="translate(165,113)"><rect width="20" height="14" rx="2" fill="#EF4444"/><text x="10" y="10" text-anchor="middle" font-size="8" font-weight="700" fill="white">&#xD7;</text></g>
<g class="nk">
  <line x1="600" y1="135" x2="200" y2="135" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#aw)"/>
  <rect x="370" y="126" width="40" height="14" rx="3" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="390" y="137" text-anchor="middle" font-size="8" font-weight="700" fill="#EF4444">NACK</text>
</g>
<g class="rx" transform="translate(165,131)"><rect width="24" height="14" rx="2" fill="#7C3AED"/><text x="12" y="10" text-anchor="middle" font-size="8" font-weight="700" fill="white">RTX</text></g>

<!-- DIVIDER -->
<line x1="30" y1="266" x2="870" y2="266" stroke="#E2E8F0" stroke-width="1"/>

<!-- CHART HEADER + LEGEND -->
<text x="50" y="284" font-size="9" font-weight="700" class="lbl-m" letter-spacing="1.5">SAME LINK — CHIRP VS CONVENTIONAL STACKS</text>
<rect x="660" y="272" width="10" height="10" rx="2" fill="#CBD5E1"/>
<text x="673" y="281" font-size="9" class="lbl-m">conventional</text>
<rect x="750" y="272" width="10" height="10" rx="2" fill="#F97316"/>
<text x="763" y="281" font-size="9" class="lbl-m">chirp</text>

  <text x="50" y="303" font-size="10" font-weight="600" class="lbl">Enterprise WAN</text>
  <text x="50" y="316" font-size="9" class="lbl-m">0.5% loss · 160ms RTT</text>
  <rect x="250" y="294"  width="22" height="12" rx="2" fill="#CBD5E1"/>
  <text x="277" y="305" font-size="9" fill="#94A3B8">~4.0 Mbps</text>
  <rect x="250" y="309" width="399"    height="14" rx="3" fill="#F97316"/>
  <text x="655" y="321" font-size="9" font-weight="600" fill="#F97316">30.9 Mbps</text>
  <rect x="720" y="306" width="40" height="20" rx="5" fill="#F97316"/>
  <text x="740" y="321" text-anchor="middle" font-size="12" font-weight="700" fill="white">8×</text>

  <text x="50" y="355" font-size="10" font-weight="600" class="lbl">Lossy WAN</text>
  <text x="50" y="368" font-size="9" class="lbl-m">2% loss · 240ms RTT</text>
  <rect x="250" y="346"  width="22" height="12" rx="2" fill="#CBD5E1"/>
  <text x="277" y="357" font-size="9" fill="#94A3B8">~1.0 Mbps</text>
  <rect x="250" y="361" width="286"    height="14" rx="3" fill="#F97316"/>
  <text x="542" y="373" font-size="9" font-weight="600" fill="#F97316">22.2 Mbps</text>
  <rect x="720" y="358" width="40" height="20" rx="5" fill="#F97316"/>
  <text x="740" y="373" text-anchor="middle" font-size="12" font-weight="700" fill="white">22×</text>

  <text x="50" y="407" font-size="10" font-weight="600" class="lbl">Satellite</text>
  <text x="50" y="420" font-size="9" class="lbl-m">2% loss · 600ms RTT</text>
  <rect x="250" y="398"  width="22" height="12" rx="2" fill="#CBD5E1"/>
  <text x="277" y="409" font-size="9" fill="#94A3B8">~0.5 Mbps</text>
  <rect x="250" y="413" width="166"    height="14" rx="3" fill="#F97316"/>
  <text x="422" y="425" font-size="9" font-weight="600" fill="#F97316">12.9 Mbps</text>
  <rect x="720" y="410" width="40" height="20" rx="5" fill="#F97316"/>
  <text x="740" y="425" text-anchor="middle" font-size="12" font-weight="700" fill="white">26×</text>

  <text x="50" y="459" font-size="10" font-weight="600" class="lbl">Drone link</text>
  <text x="50" y="472" font-size="9" class="lbl-m">8% loss · 200ms RTT</text>
  <rect x="250" y="450"  width="22" height="12" rx="2" fill="#CBD5E1"/>
  <text x="277" y="461" font-size="9" fill="#94A3B8">~0.3 Mbps</text>
  <rect x="250" y="465" width="194"    height="14" rx="3" fill="#F97316"/>
  <text x="450" y="477" font-size="9" font-weight="600" fill="#F97316">15.0 Mbps</text>
  <rect x="720" y="462" width="40" height="20" rx="5" fill="#F97316"/>
  <text x="740" y="477" text-anchor="middle" font-size="12" font-weight="700" fill="white">50×</text>

</svg>